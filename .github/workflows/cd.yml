name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  DEFAULT_DEPLOY_HOST: dprogger.online
  DEFAULT_DEPLOY_USER: root

jobs:
  deploy:
    name: Deploy To Server
    runs-on: ubuntu-latest
    environment: secrets
    timeout-minutes: 15
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master'))

    steps:
      - name: Validate deploy config
        shell: bash
        env:
          EFFECTIVE_DEPLOY_HOST: ${{ secrets.DEPLOY_HOST != '' && secrets.DEPLOY_HOST || env.DEFAULT_DEPLOY_HOST }}
          EFFECTIVE_DEPLOY_USER: ${{ secrets.DEPLOY_USER != '' && secrets.DEPLOY_USER || env.DEFAULT_DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          [ -n "$EFFECTIVE_DEPLOY_HOST" ] || { echo "Missing DEPLOY_HOST"; exit 1; }
          [ -n "$EFFECTIVE_DEPLOY_USER" ] || { echo "Missing DEPLOY_USER"; exit 1; }
          [ -n "$DEPLOY_SSH_KEY" ] || { echo "Missing DEPLOY_SSH_KEY"; exit 1; }
          [ -n "$GHCR_TOKEN" ] || { echo "Missing GHCR_TOKEN"; exit 1; }

      - name: Deploy latest image
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST != '' && secrets.DEPLOY_HOST || env.DEFAULT_DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER != '' && secrets.DEPLOY_USER || env.DEFAULT_DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            IMAGE="ghcr.io/didar1505/url-shortener:latest"
            CONTAINER_NAME="url-service"

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
            docker pull "$IMAGE"

            if docker ps -a --format '{{.Names}}' | grep -Eq "^${CONTAINER_NAME}$"; then
              docker rm -f "$CONTAINER_NAME"
            fi

            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p 50051:50051 \
              "$IMAGE"
